name: Visual Regression (AWS Amplify)

# This workflow listens for successful AWS Amplify PR previews and automatically 
# triggers a visual check against production.

on:
  check_run:
    types: [completed]
  workflow_dispatch: # Allows manual trigger from Actions tab
    inputs:
      preview-url:
        description: 'Manual Preview URL to test'
        required: true
      pr-number:
        description: 'PR Number (for results)'
        required: false

jobs:
  visual-check:
    # Only run if the check was the Amplify Preview build and it succeeded.
    # Note: If your check name is different (e.g., 'Amplify Console'), update it below.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'check_run' && 
        github.event.check_run.conclusion == 'success' && 
        contains(github.event.check_run.name, 'Amplify')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for posting comments
    steps:
      - uses: actions/checkout@v4

      - name: Extract Environment Info
        id: env
        uses: actions/github-script@v7
        with:
          script: |
            let previewUrl = '';
            let prNumber = '';

            if (context.eventName === 'workflow_dispatch') {
              previewUrl = context.payload.inputs['preview-url'];
              prNumber = context.payload.inputs['pr-number'];
            } else {
              const checkRun = context.payload.check_run;
              previewUrl = checkRun.details_url;
              if (checkRun.pull_requests && checkRun.pull_requests.length > 0) {
                prNumber = checkRun.pull_requests[0].number;
              }
            }

            core.setOutput('url', previewUrl);
            core.setOutput('pr', prNumber);
            console.log(`Found Preview URL: ${previewUrl}`);

      - name: Run Visual Check
        if: steps.env.outputs.url != ''
        env:
          # Add this to your GitHub Repository Secrets
          REGRESSIONBOT_API_KEY: ${{ secrets.REGRESSIONBOT_API_KEY }}
        run: |
          # The CLI will crawl your site using its sitemap.xml.
          # Replace --project and --against URL with your production values.

          npx regressionbot@latest ${{ steps.env.outputs.url }} \
            --project "my-amplify-site" \
            --against "https://www.your-production-site.com" \
            --sitemap "${{ steps.env.outputs.url }}/sitemap.xml" \
            --on "Desktop Chrome"

      - name: Comment on PR (Failure)
        if: failure() && steps.env.outputs.pr != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.env.outputs.pr }}';
            const body = `### ⚠️ Visual Regressions Detected\n\nVisual tests failed on the [Amplify Preview](${process.env.TEST_URL}).\nReview the diffs in the [RegressionBot Dashboard](https://regressionbot.com).`;
            
            await github.rest.issues.createComment({
              issue_number: parseInt(prNumber),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        env:
          TEST_URL: ${{ steps.env.outputs.url }}
