name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      
      - run: npm install
      - run: npm run build

      - name: Publish to npm
        # We use a simple script to skip publishing if the version already exists
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$CURRENT_VERSION" version > /dev/null 2>&1; then
            echo "Version $CURRENT_VERSION already exists on npm. Skipping publish."
          else
            npm publish --provenance --access public
          fi

