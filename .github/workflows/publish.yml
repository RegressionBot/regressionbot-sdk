name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # CRITICAL for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Node 22+ is required for native Trusted Publishing support
      
      - name: Upgrade npm
        run: npm install -g npm@latest # Ensures npm v11.5.1+ which handles OIDC automatically
      
      - run: npm install
      - run: npm run build

      - name: Publish to npm
        # No NODE_AUTH_TOKEN needed. npm v11+ detects the OIDC environment automatically.
        # We check if the version exists first to avoid failing on duplicate pushes.
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$CURRENT_VERSION" version > /dev/null 2>&1; then
            echo "Version $CURRENT_VERSION already exists on npm. Skipping publish."
          else
            npm publish --provenance --access public
          fi
