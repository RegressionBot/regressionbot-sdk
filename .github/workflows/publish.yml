name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # CRITICAL for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Node 22+ is required for native Trusted Publishing support
      
      - run: npm install
      - run: npm run build

      - name: Publish to npm
        # Use npx npm@latest to ensure we have the latest CLI (v11+) for stable OIDC/Trusted Publishing
        # without crashing the runner via a global upgrade.
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npx npm@latest view "$PACKAGE_NAME@$CURRENT_VERSION" version > /dev/null 2>&1; then
            echo "Version $CURRENT_VERSION already exists on npm. Skipping publish."
          else
            npx npm@latest publish --provenance --access public
          fi
